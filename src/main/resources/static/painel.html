<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Chamados - ObservAção</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <div class="card">
    <div class="top-bar">
      <a href="index.html" class="sair-btn">Sair</a>
    </div>
    <h1>Consultar Chamados</h1>

    <!-- Filtros (client-side) -->
    <div class="search-row">
      <label>Prioridade:</label>
      <select id="f-prioridade" onchange="aplicarFiltros()">
        <option value="">Todas</option>
        <option value="BAIXA">Baixa</option>
        <option value="MEDIA">Média</option>
        <option value="ALTA">Alta</option>
      </select>
    </div>
    <div class="search-row">
      <label>Categoria:</label>
      <select id="f-categoria" onchange="aplicarFiltros()">
        <option value="">Todas</option>
        <option value="Iluminação">Iluminação Pública</option>
        <option value="Buraco">Buraco / Pavimentação</option>
        <option value="Limpeza">Limpeza e Coleta</option>
        <option value="Saúde">Saúde Pública</option>
        <option value="Segurança Escolar">Segurança Escolar</option>
      </select>
    </div>
    <div class="search-row">
      <label>Bairro:</label>
      <input type="text" id="f-bairro" placeholder="Nome do bairro..." oninput="aplicarFiltros()">
    </div>
    <div class="search-row">
      <label>Buscar:</label>
      <input type="text" id="f-busca" placeholder="Protocolo, descrição ou status..." oninput="aplicarFiltros()">
    </div>

    <div id="list-area">
      <div class="loading-msg">Carregando...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script>
  let todosChamados = [];

  function renderTabela(lista) {
    const area = document.getElementById('list-area');

    if (!lista.length) {
      area.innerHTML = '<div class="empty-msg">Nenhum chamado encontrado.</div>';
      return;
    }

    const linhas = lista.map(c => `
      <tr class="clickable" onclick="window.location.href='detalhes.html?protocolo=${encodeURIComponent(c.protocolo)}'">
        <td>${c.protocolo || '–'}</td>
        <td>${trunc(c.descricao, 60) || '–'}</td>
        <td><span class="badge">${fmtStatus(c.status)}</span></td>
      </tr>`).join('');

    area.innerHTML = `
      <table>
        <thead><tr>
          <th>Código &#9660;</th>
          <th>Descrição &#9660;</th>
          <th>Status &#9660;</th>
        </tr></thead>
        <tbody>${linhas}</tbody>
      </table>`;
  }

  function aplicarFiltros() {
    const prioridade = document.getElementById('f-prioridade').value;
    const categoria  = document.getElementById('f-categoria').value.toLowerCase();
    const bairro     = document.getElementById('f-bairro').value.trim().toLowerCase();
    const texto      = document.getElementById('f-busca').value.toLowerCase();

    const filtrado = todosChamados.filter(c => {
      if (prioridade && (c.prioridade || '').toUpperCase() !== prioridade) return false;
      if (categoria  && (c.categoria  || '').toLowerCase() !== categoria)  return false;
      if (bairro     && !(c.localizacao || '').toLowerCase().includes(bairro)) return false;
      if (texto) {
        const campos = (c.protocolo || '') + (c.categoria || '') + (c.localizacao || '') +
                       (c.descricao || '') + (c.status || '');
        if (!campos.toLowerCase().includes(texto)) return false;
      }
      return true;
    });
    renderTabela(filtrado);
  }

  async function carregar() {
    try {
      todosChamados = await listarSolicitacoes();
      renderTabela(todosChamados);
    } catch (err) {
      document.getElementById('list-area').innerHTML =
        `<div class="error-msg">Erro ao carregar: ${err.message}</div>`;
    }
  }

  carregar();
</script>
</body>
</html>
